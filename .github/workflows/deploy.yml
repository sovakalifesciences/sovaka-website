name: Build and Deploy Static Website to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js Static Export
        run: npm run build
        env:
          NEXT_PUBLIC_FORMSPREE_FORM_ID: ${{ secrets.NEXT_PUBLIC_FORMSPREE_FORM_ID }}



      - name: Diagnostic SFTP Connection Test
        continue-on-error: true
        run: |
          node -e "
          const net = require('net');
          const host = '${{ secrets.SFTP_SERVER || secrets.FTP_SERVER || secrets.FTP_HOST }}' || '91.108.101.182';
          const port = parseInt('${{ secrets.SFTP_PORT || secrets.FTP_PORT }}') || 65002;
          console.log('Attempting diagnostic TCP connection to ' + host + ':' + port + '...');
          const socket = net.connect(port, host, () => {
            console.log('SUCCESS: TCP socket established on port ' + port + '!');
            socket.destroy();
            process.exit(0);
          });
          socket.setTimeout(10000);
          socket.on('timeout', () => {
            console.error('ERROR: Connection timed out on port ' + port + '. Please verify the network path and firewall settings.');
            socket.destroy();
            process.exit(1);
          });
          socket.on('error', (err) => {
            console.error('ERROR: Connection failed on port ' + port + ':', err.message);
            process.exit(1);
          });
          "

      - name: Deploy via SFTP to Hostinger
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          username: ${{ secrets.SFTP_USERNAME || 'u156087372' }}
          server: ${{ secrets.SFTP_SERVER || secrets.FTP_SERVER || secrets.FTP_HOST || '91.108.101.182' }}
          port: ${{ secrets.SFTP_PORT || secrets.FTP_PORT || 65002 }}
          password: ${{ secrets.SFTP_PASSWORD || secrets.FTP_PASSWORD }}
          local_path: './out/*'
          remote_path: 'domains/sovakalifesciences.com/public_html/'


