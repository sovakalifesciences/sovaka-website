name: Build and Deploy Static Website to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js Static Export
        run: npm run build
        env:
          NEXT_PUBLIC_FORMSPREE_FORM_ID: ${{ secrets.NEXT_PUBLIC_FORMSPREE_FORM_ID }}

      # ============================================================
      # DIAGNOSTIC STEP 1: Secret Presence Check
      # Prints Present/Missing for each secret. Never prints values.
      # ============================================================
      - name: 'Diagnostic 1: Secret Presence & Length Check'
        continue-on-error: true
        run: |
          echo "========================================"
          echo "DIAGNOSTIC 1: Secret Presence & Length"
          echo "========================================"

          # --- Presence ---
          if [ -n "$SFTP_SERVER_CHECK" ]; then
            echo "SFTP_SERVER:   Present"
          else
            echo "SFTP_SERVER:   Missing"
          fi

          if [ -n "$SFTP_PORT_CHECK" ]; then
            echo "SFTP_PORT:     Present"
          else
            echo "SFTP_PORT:     Missing"
          fi

          if [ -n "$SFTP_USERNAME_CHECK" ]; then
            echo "SFTP_USERNAME: Present"
          else
            echo "SFTP_USERNAME: Missing"
          fi

          if [ -n "$SFTP_PASSWORD_CHECK" ]; then
            echo "SFTP_PASSWORD: Present"
          else
            echo "SFTP_PASSWORD: Missing"
          fi

          echo ""
          echo "--- String Lengths ---"
          echo "SFTP_SERVER   length: ${#SFTP_SERVER_CHECK}   (expected: 14 for 91.108.101.182)"
          echo "SFTP_PORT     length: ${#SFTP_PORT_CHECK}   (expected: 5 for 65002)"
          echo "SFTP_USERNAME length: ${#SFTP_USERNAME_CHECK}   (expected: 37 for u156087372.sovakalifesciences.com)"
          echo "SFTP_PASSWORD length: ${#SFTP_PASSWORD_CHECK}"

          echo ""
          echo "--- Hidden Character Detection ---"
          # Print hex of first and last 2 bytes to detect spaces/newlines
          if [ -n "$SFTP_SERVER_CHECK" ]; then
            FIRST2=$(echo -n "$SFTP_SERVER_CHECK" | head -c 2 | xxd -p)
            LAST2=$(echo -n "$SFTP_SERVER_CHECK" | tail -c 2 | xxd -p)
            echo "SFTP_SERVER   first2hex: $FIRST2  last2hex: $LAST2  (expect: 3931=91  3832=82)"
          fi
          if [ -n "$SFTP_PORT_CHECK" ]; then
            FIRST2=$(echo -n "$SFTP_PORT_CHECK" | head -c 2 | xxd -p)
            LAST2=$(echo -n "$SFTP_PORT_CHECK" | tail -c 2 | xxd -p)
            echo "SFTP_PORT     first2hex: $FIRST2  last2hex: $LAST2  (expect: 3635=65  3032=02)"
          fi

          echo "========================================"
        env:
          SFTP_SERVER_CHECK: ${{ secrets.SFTP_SERVER }}
          SFTP_PORT_CHECK: ${{ secrets.SFTP_PORT }}
          SFTP_USERNAME_CHECK: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD_CHECK: ${{ secrets.SFTP_PASSWORD }}

      # ============================================================
      # DIAGNOSTIC STEP 2: Raw TCP Connection Test (nc -zv)
      # Proves whether the GitHub runner can reach port 65002.
      # Uses hardcoded values so this test works even if secrets
      # are missing.
      # ============================================================
      - name: 'Diagnostic 2: TCP Connection Test (nc -zv)'
        continue-on-error: true
        run: |
          echo "========================================"
          echo "DIAGNOSTIC 2: TCP Connection Test"
          echo "========================================"

          # Determine target from secrets, fall back to known values
          TARGET_HOST="${SFTP_SERVER_VAL:-91.108.101.182}"
          TARGET_PORT="${SFTP_PORT_VAL:-65002}"

          echo "Target: ${TARGET_HOST}:${TARGET_PORT}"
          echo ""

          echo "--- Test A: nc -zv (TCP connect) ---"
          timeout 15 nc -zv "$TARGET_HOST" "$TARGET_PORT" 2>&1 || echo "nc exited with code $?"
          echo ""

          echo "--- Test B: nc -zv port 21 (FTP control) ---"
          timeout 10 nc -zv "$TARGET_HOST" 21 2>&1 || echo "nc exited with code $?"
          echo ""

          echo "--- Test C: nc -zv port 22 (standard SSH) ---"
          timeout 10 nc -zv "$TARGET_HOST" 22 2>&1 || echo "nc exited with code $?"
          echo ""

          echo "========================================"
        env:
          SFTP_SERVER_VAL: ${{ secrets.SFTP_SERVER }}
          SFTP_PORT_VAL: ${{ secrets.SFTP_PORT }}

      # ============================================================
      # DIAGNOSTIC STEP 3: SSH Handshake Test (ssh -v)
      # Captures verbose SSH output to show exactly:
      #   - Whether TCP connection establishes
      #   - Whether SSH key exchange completes
      #   - Whether authentication methods are offered
      #   - Exact point of failure
      # Uses a non-interactive, timeout-bounded command.
      # ============================================================
      - name: 'Diagnostic 3: SSH Handshake Test (ssh -v)'
        continue-on-error: true
        run: |
          echo "========================================"
          echo "DIAGNOSTIC 3: SSH Handshake & Auth Stage"
          echo "========================================"

          TARGET_HOST="${SFTP_SERVER_VAL:-91.108.101.182}"
          TARGET_PORT="${SFTP_PORT_VAL:-65002}"

          echo "Target: ${TARGET_HOST}:${TARGET_PORT}"
          echo "Timeout: 15 seconds"
          echo ""

          # Run SSH with verbose output, no interactive prompts,
          # batch mode (fail immediately if password auth is needed
          # and no key is available), 15s connect timeout.
          # This tells us exactly how far the handshake gets.
          timeout 20 ssh -v \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o BatchMode=yes \
            -o PreferredAuthentications=publickey,password \
            -p "$TARGET_PORT" \
            "diagnostic_test@${TARGET_HOST}" \
            "echo connected" 2>&1 || true

          echo ""
          echo "========================================"
          echo "INTERPRETATION GUIDE:"
          echo "  'Connection established' = TCP layer OK"
          echo "  'SSH2_MSG_KEXINIT'       = SSH handshake started"
          echo "  'SSH2_MSG_NEWKEYS'       = Key exchange completed"
          echo "  'Authentications that can continue' = Auth stage reached"
          echo "  'Permission denied'      = Credentials rejected"
          echo "  'Connection timed out'   = Network/firewall blocked"
          echo "========================================"
        env:
          SFTP_SERVER_VAL: ${{ secrets.SFTP_SERVER }}
          SFTP_PORT_VAL: ${{ secrets.SFTP_PORT }}

      # ============================================================
      # ACTUAL DEPLOY STEP
      # ============================================================
      - name: Deploy via SFTP to Hostinger
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          username: ${{ secrets.SFTP_USERNAME }}
          server: ${{ secrets.SFTP_SERVER }}
          port: ${{ secrets.SFTP_PORT }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_path: './out/*'
          remote_path: 'domains/sovakalifesciences.com/public_html/'
